# coturn — relais TURN/STUN pour le voice chat « Miray ».
#
# Pourquoi : le voice chat est en WebRTC P2P. Quand les deux téléphones sont sur des réseaux
# différents (ex. l'un en WiFi, l'autre en données mobiles = NAT symétrique/CGNAT), ils ne peuvent
# PAS se joindre directement, et WebRTC sur Android ne récupère pas l'IP 100.x du tun Tailscale.
# Ce serveur TURN relaie alors l'audio. Il est joignable par les deux téléphones via l'IP Tailscale
# du serveur, donc le trafic reste dans le tailnet privé.

listening-port=3478

# IP annoncée aux clients pour le relais = IP Tailscale de CE serveur (les deux téléphones la
# joignent via Tailscale). ⚠️ À mettre à jour si l'IP Tailscale du serveur change.
external-ip=100.104.159.28

# Plage de ports de relais (doit être publiée par Docker, cf. docker-compose.yml). Volontairement
# étroite : 2 personnes, une poignée d'allocations suffisent.
min-port=49160
max-port=49200

# Authentification long-terme avec identifiants statiques (cohérent avec la clé Reverb codée côté
# app). DOIT matcher TURN_USER / TURN_PASSWORD dans VoiceChatManager.kt.
lt-cred-mech
realm=miray
user=miray:miray-turn-2026

# Trafic déjà confiné au tailnet privé → pas de TLS/DTLS.
no-tls
no-dtls

fingerprint

# Durcissement minimal : interdire le relais vers des adresses privées/loopback hors tailnet.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255

# Logs sur la sortie standard (visibles via `docker compose logs -f`).
log-file=stdout
simple-log
